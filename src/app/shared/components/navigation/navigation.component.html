<!-- Top Navigation Bar -->
<nav class="nav-container">
  <div class="nav-content">
    <div class="nav-inner">
      <div class="nav-left">
        <div class="logo-section">
          <div class="logo-icon">
            <span nz-icon nzType="tool" nzTheme="outline"></span>
          </div>
          <div class="logo-text">
            <span class="logo-title">IssueTracker</span>
            <span class="logo-subtitle">Internal Tool</span>
          </div>
        </div>
      </div>

      <div class="nav-right">
        <div class="store-ops">
          <div class="store-ops-content">
            <span nz-icon nzType="shop" nzTheme="outline"></span>
            Store Operations
          </div>
        </div>

        <div class="divider"></div>

        <div class="user-section">
          <div class="user-info">
            <span class="user-name">{{ user?.name }}</span>
            <span class="user-role">L-4 Associate</span>
          </div>
          <div class="user-avatar">
            {{ getInitials() }}
          </div>
          <button class="settings-btn" (click)="openSettings()" [disabled]="!user" type="button" aria-label="Open user settings">
            <span nz-icon nzType="setting" nzTheme="outline"></span>
          </button>
          <button class="logout-btn" (click)="onLogout()" type="button" aria-label="Logout">
            <span nz-icon nzType="logout" nzTheme="outline"></span>
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Issue Explorer Section -->
<div class="explorer-section">
  <div class="explorer-content">
    <div class="explorer-inner">
      <div class="explorer-left">
        <h1 class="explorer-title">Issue Explorer</h1>
        <p class="explorer-subtitle">
          Manage reported issues for your store locations
          <span class="stat-dot"></span>
          <span class="stat-orange">{{ totalReports }} Total Reports</span>
          <span class="stat-dot"></span>
          <span class="stat-blue">{{ sentToJira }} Sent to Jira</span>
        </p>
      </div>
      <div class="explorer-right">
        <button class="report-btn" (click)="onReportIssue()">
          <span nz-icon nzType="plus" nzTheme="outline"></span>
          Report New Issue
        </button>
      </div>
    </div>
  </div>
</div>

<nz-modal
  [(nzVisible)]="isSettingsOpen"
  [nzFooter]="null"
  [nzMaskClosable]="true"
  [nzCentered]="true"
  [nzWidth]="560"
  nzWrapClassName="user-settings-modal"
  (nzOnCancel)="closeSettings()"
>
  <ng-container *nzModalContent>
    <div class="settings-modal">
      <div class="settings-modal__header">
        <div class="settings-modal__title-row">
          <span nz-icon nzType="setting" nzTheme="outline"></span>
          <h2>User Settings</h2>
        </div>
        <p>Customize your reporting defaults for faster submission.</p>
      </div>

      <form class="settings-modal__body" [formGroup]="settingsForm" (ngSubmit)="saveSettings()">
        <label class="settings-field">
          <span>Display Name</span>
          <input nz-input formControlName="name" placeholder="Your name" />
        </label>

        <label class="settings-field">
          <span>Preferred Team</span>
          <nz-select formControlName="preferredCategory" nzPlaceHolder="Select team">
            <nz-option
              *ngFor="let category of categories"
              [nzValue]="category.id"
              [nzLabel]="category.label"
            ></nz-option>
          </nz-select>
        </label>

        <label class="settings-field">
          <span>Preferred Sub-Team</span>
          <input nz-input formControlName="preferredSubTeam" placeholder="Optional" />
        </label>

        <div class="settings-actions">
          <button nz-button nzType="default" type="button" (click)="closeSettings()">Cancel</button>
          <button nz-button nzType="primary" [disabled]="settingsForm.invalid || isSavingSettings" type="submit">
            {{ isSavingSettings ? 'Saving...' : 'Save Settings' }}
          </button>
        </div>
      </form>
    </div>
  </ng-container>
</nz-modal>
